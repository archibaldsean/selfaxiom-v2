services:
  db:
    image: postgres:16
    container_name: selfaxiom_db
    ports:
      - "5302:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - selfaxiom_pgdata:/var/lib/postgresql/data
    networks:
      - selfaxiom_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../api
    container_name: selfaxiom_api
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - selfaxiom_net

  nginx:
    image: nginx:alpine
    container_name: selfaxiom_nginx
    ports:
      - "8080:80"
    volumes:
      - ../web/public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - selfaxiom_net

networks:
  selfaxiom_net:

volumes:
  selfaxiom_pgdata:
