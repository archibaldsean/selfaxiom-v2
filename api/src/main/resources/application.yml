server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      schema: selfaxiom
  flyway:
    enabled: true
    default-schema: selfaxiom
    schemas: selfaxiom

auth:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:change-me-access-secret-change-me-access-secret}
    refresh-secret: ${JWT_REFRESH_SECRET:change-me-refresh-secret-change-me-refresh-secret}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}
  refresh-cookie-name: ${AUTH_REFRESH_COOKIE_NAME:selfaxiom_refresh}
  refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}
  refresh-cookie-path: ${AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
